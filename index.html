  const searchInput = document.getElementById('searchInput');
  const resultInfo = document.getElementById('resultInfo');

  function renderTable() {
    const filter = currentFilter.toLowerCase();
    let filtered = students;
    if (filter) {
      filtered = students.filter(s => s.nama.toLowerCase().includes(filter));
    }
    resultInfo.innerText = `${filtered.length} data ditemukan`;
    tbody.innerHTML = '';
    filtered.forEach((siswa, idx) => {
      const rank = students.findIndex(s => s.noUrut === siswa.noUrut) + 1;
      let rankClass = '';
      if (rank === 1) rankClass = 'rank-1';
      else if (rank === 2) rankClass = 'rank-2';
      else if (rank === 3) rankClass = 'rank-3';
      const row = tbody.insertRow();
      row.insertCell(0).innerHTML = `<span class="rank-badge ${rankClass}">${rank}</span>`;
