    * {

      padding: 2rem 1.5rem;
      color: #1a2c3e;
    }

    .container {

      margin: 0 auto;
    }

    /* header modern */
    .hero {
      text-align: center;
      margin-bottom: 3rem;
    }

    .hero h1 {
      font-size: 2.4rem;
      font-weight: 800;
      background: linear-gradient(145deg, #1f5e8c, #134b6f);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.5px;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .hero h1 i {
      background: none;
      -webkit-background-clip: unset;
      background-clip: unset;
      color: #2c7da0;
      font-size: 2rem;
    }

    .sub {
      color: #2c5a74;
      font-weight: 500;
      margin-top: 8px;
      font-size: 1rem;
    }

    /* stat card grid */
    .stats-grid {
      display: flex;
      justify-content: center;
      gap: 1.8rem;
      flex-wrap: wrap;
      margin: 2rem 0 2.5rem;
    }

    .stat-card {
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(12px);
      border-radius: 2rem;
      padding: 1rem 2rem;
      box-shadow: 0 10px 20px rgba(0,0,0,0.05), 0 0 0 1px rgba(255,255,255,0.5);
      display: flex;
      align-items: baseline;
      gap: 12px;
      transition: all 0.2s;
    }

    .stat-card i {
      font-size: 1.7rem;
      color: #2c7da0;
    }

    .stat-label {
      font-weight: 600;
      color: #1f4e6e;
    }

    .stat-value {
      font-weight: 800;
      font-size: 1.7rem;
      color: #0f3b54;
      line-height: 1;
    }

    /* tabel premium */
    .table-wrapper {
      background: white;
      border-radius: 2rem;
      box-shadow: 0 20px 35px -12px rgba(0,0,0,0.15);
      overflow: hidden;
      transition: all 0.2s;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    th {
      background: #1f5e8c;
      color: white;
      padding: 1rem 0.8rem;
      font-weight: 600;
      font-size: 0.9rem;
      letter-spacing: 0.3px;
    }

    td {
      padding: 0.9rem 0.8rem;
      border-bottom: 1px solid #eef2f8;
      vertical-align: middle;
    }

    tr:last-child td {
      border-bottom: none;
    }

    tr:hover td {
      background: #f8fbfe;
    }

    /* peringkat dengan medali */
    .rank-cell {
      font-weight: 800;
      text-align: center;
      width: 70px;
    }

    .rank-number {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border-radius: 40px;
      font-weight: 800;
      background: #eef2fa;
      color: #1f5e8c;
    }

    .rank-1 {
      background: linear-gradient(145deg, #ffd966, #ffb347);
      color: #4a2e00;
      box-shadow: 0 2px 8px rgba(255,180,0,0.3);
    }

    .rank-2 {
      background: linear-gradient(145deg, #e0e0e0, #c0c0c0);
      color: #2c2c2c;
    }

    .rank-3 {
      background: linear-gradient(145deg, #e0b07f, #cd7f32);
      color: #2f1d0a;
    }

    .nama-siswa {
      font-weight: 700;
      color: #1f3e54;
    }

    .nilai-badge {
      font-weight: 800;
      background: #eef2fa;
      padding: 0.25rem 0.9rem;
      border-radius: 30px;
      display: inline-block;
      font-size: 0.9rem;
      color: #1f5e8c;
    }

    .smt-badge {
      font-family: monospace;
      font-weight: 600;
      background: #f4f7fb;
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
      font-size: 0.8rem;
      display: inline-block;
    }

    footer {
      text-align: center;
      margin-top: 2rem;
      font-size: 0.75rem;
      color: #5e7e97;
    }

    @media (max-width: 800px) {
      body { padding: 1rem; }
      .hero h1 { font-size: 1.7rem; }
      .stat-value { font-size: 1.2rem; }
      th, td { font-size: 0.7rem; padding: 0.5rem 0.3rem; }
      .rank-number { width: 30px; height: 30px; font-size: 0.8rem; }
      .nilai-badge { font-size: 0.7rem; padding: 0.1rem 0.5rem; }
    }
  </style>
</head>
